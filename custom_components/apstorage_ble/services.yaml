set_peak_power:
  name: Set Peak Power
  description: Set peak-shaving power over BLE via setsysmode (mode 5 only).
  fields:
    peak_power:
      name: Peak Power
      description: Peak-shaving power setpoint in watts (100-50000).
      required: true
      example: 5000
      selector:
        number:
          min: 100
          max: 50000
          step: 1
          unit_of_measurement: W
          mode: box
    entry_id:
      name: Config Entry ID
      description: Optional target entry id. Required if multiple APstorage entries are loaded and address is not provided.
      required: false
      selector:
        text:
    address:
      name: Bluetooth Address
      description: Optional target device MAC address (AA:BB:CC:DD:EE:FF). Required if multiple entries are loaded and entry_id is not provided.
      required: false
      selector:
        text:
